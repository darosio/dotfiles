#!/usr/bin/nft -f
#

# This command is essential. It clears all old rules.
flush ruleset

# Create a new filter table
table inet filter {

  chain input {
    type filter hook input priority filter; policy drop;

    # Accept traffic from the loopback interface
    iif "lo" accept

    # Allow established and related connections
    ct state {established, related} accept

    # Allow incoming SSH (port 22)
    tcp dport 23456 accept

    # Allow Syncthing (22000 TCP/UDP for data, 21027 UDP for local discovery)
    tcp dport 22000 accept
    udp dport 22000 accept
    udp dport { 5355, 21027, 1947 } accept

    # Allow ICMP (Ping)
    ip protocol icmp accept
    ip6 nexthdr ipv6-icmp accept

    # Log and drop everything else (rate-limited to avoid journal flooding)
    limit rate 5/minute log prefix "nftables-dropped: " level warn
    drop
  }

  chain forward {
    type filter hook forward priority filter; policy drop;
  }

  chain output {
    type filter hook output priority filter; policy accept;
  }

}
