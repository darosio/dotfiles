use_default_settings: true
server:
  secret_key: "CHANGE_THIS_TO_A_LONG_RANDOM_STRING"
  bind_address: "0.0.0.0"
  port: 8080
  public_instance: false
  limiter: false
  allowed_media_types:
    - text/html
    - application/json
engines:
  - name: google scholar
    disabled: false
    categories: [general, science]
  - name: pubmed
    disabled: false
    categories: [general, science]
  - name: semantic scholar
    disabled: false
    categories: [general, science]
  - name: arxiv
    disabled: false
    categories: [general, science]
  - name: crossref
    disabled: false
    categories: [general, science]
  - name: wolframalpha
    disabled: false
    categories: [general, science]
  - name: wikidata
    disabled: true
categories_as_tabs:
  general:
    - general
  science:
    - science
  news:
    - news
  images:
    - images
search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json
