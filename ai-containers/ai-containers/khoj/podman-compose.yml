services:
  database:
    image: docker.io/pgvector/pgvector:pg15
    container_name: khoj-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - khoj_db:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  sandbox:
    image: ghcr.io/khoj-ai/terrarium:latest
    container_name: khoj-sandbox
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 2
    restart: unless-stopped

  server:
    image: ghcr.io/khoj-ai/khoj:latest
    container_name: khoj
    command: --host 0.0.0.0 --port 42110 --anonymous-mode
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "42110:42110"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app
    volumes:
      - khoj_config:/root/.khoj/
      - khoj_models:/root/.cache/torch/sentence_transformers
      - khoj_models:/root/.cache/huggingface
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - KHOJ_DJANGO_SECRET_KEY=${KHOJ_DJANGO_SECRET_KEY}
      - KHOJ_DEBUG=False
      - KHOJ_ADMIN_EMAIL=${KHOJ_ADMIN_EMAIL}
      - KHOJ_ADMIN_PASSWORD=${KHOJ_ADMIN_PASSWORD}
      - KHOJ_TERRARIUM_URL=http://sandbox:8080
      # Ollama on host
      - OPENAI_BASE_URL=http://host.docker.internal:11434/v1/
      - KHOJ_DEFAULT_CHAT_MODEL=qwen3.5:35b-a3b
      # Uncomment and set API keys for cloud providers
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: unless-stopped

volumes:
  khoj_db:
  khoj_config:
  khoj_models:
