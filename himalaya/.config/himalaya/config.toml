# Himalaya config — Maildir read + msmtp send
# Shares ~/Maildir/ with mu4e/mbsync. Read-only from mbsync perspective;
# sending goes via msmtp (same as mu4e).
# Himalaya is the agent-facing interface; mu4e is the human-facing interface.

################################################################################
# CNR (primary — Office 365, OAuth2 IMAP handled by mbsync not himalaya)
################################################################################
[accounts.cnr]
email = "daniele.arosio@cnr.it"
display-name = "Daniele Arosio (CNR)"
default = true

backend.type = "maildir"
backend.root-dir = "~/Maildir/cnr"

message.send.backend.type = "sendmail"
message.send.backend.cmd = "msmtp --account=cnr -t"

folder.aliases.inbox = "INBOX"
folder.aliases.sent = "Sent Items"
folder.aliases.drafts = "Drafts"
folder.aliases.trash = "Deleted Items"

################################################################################
# Gmail
################################################################################
[accounts.gmail]
email = "danielepietroarosio@gmail.com"
display-name = "Daniele Arosio (Gmail)"

backend.type = "maildir"
backend.root-dir = "~/Maildir/gmail"

message.send.backend.type = "sendmail"
message.send.backend.cmd = "msmtp --account=gmail -t"

folder.aliases.inbox = "Inbox"
folder.aliases.sent = "[Gmail]/Sent Mail"
folder.aliases.drafts = "[Gmail]/Drafts"
folder.aliases.trash = "[Gmail]/Trash"

################################################################################
# PEC (Postecert)
################################################################################
[accounts.pec]
email = "daniele.arosio@postecert.it"
display-name = "Daniele Arosio (PEC)"

backend.type = "maildir"
backend.root-dir = "~/Maildir/pec"

message.send.backend.type = "sendmail"
message.send.backend.cmd = "msmtp --account=pec -t"

folder.aliases.inbox = "INBOX"
